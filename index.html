<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rogers Holdings LLC | Business Development & Investments in Kentucky</title>

  <meta name="description" content="Rogers Holdings LLC is a Kentucky-based holding company focused on business development, investments, and long-term growth across multiple industries.">
  <meta name="keywords" content="Rogers Holdings LLC, Kentucky holding company, business development Kentucky, investments, Mount Sterling KY business">
  <meta name="author" content="Rogers Holdings LLC">

  <link rel="icon" type="image/png" href="Profile Logo.png">

  <style>
    :root {
      --gold: #c49a3a;
      --dark: #111111;
      --cream: #f8f6f1;
      --white: #ffffff;
      --soft: #fdfbf7;
    }

    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--cream);
      color: var(--dark);
    }

    /* UPDATED NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 20px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(6px);
      border-bottom: 2px solid var(--gold);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .profile-logo {
      width: 92px;
      margin-bottom: 12px;
    }

    nav h2 {
      margin: 0 0 12px 0;
      letter-spacing: 5px;
      font-size: 18px;
    }

    nav div {
      display: flex;
      gap: 28px;
    }

    nav a {
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dark);
    }

    .hero {
      display: flex;
      justify-content: center;
      padding: 75px 20px;
      background: linear-gradient(180deg, #fdfbf7, #f8f6f1);
    }

    .hero-frame {
      max-width: 980px;
      width: 100%;
      padding: 18px;
      border: 1px solid rgba(196,154,58,0.7);
      background: rgba(255,255,255,0.65);
    }

    .hero img {
      width: 100%;
      border: 4px solid var(--gold);
    }

    .hero-headline {
      text-align: center;
      padding: 50px 20px 20px;
    }

    .hero-headline h1 {
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .hero-headline p {
      font-family: Arial, sans-serif;
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    section {
      padding: 100px 8%;
      background: var(--white);
    }

    .section-title {
      text-align: center;
      margin-bottom: 45px;
    }

    .section-title h1 {
      font-size: 42px;
    }

    /* UPDATED CARD INTERACTION */
    .card {
      max-width: 920px;
      margin: 0 auto 35px;
      padding: 45px;
      border: 1px solid rgba(196,154,58,0.85);
      text-align: center;
      background: linear-gradient(180deg, #ffffff, var(--soft));
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    }

    /* FIXED FEATURED CARD */
    .featured-card {
      border: 2px solid var(--gold);
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    }

    .card h2 {
      font-size: 28px;
      letter-spacing: 3px;
    }

    .card p {
      font-family: Arial, sans-serif;
      line-height: 1.7;
      max-width: 700px;
      margin: 0 auto;
    }

    .family-photo {
      max-width: 400px;
      margin: 20px auto;
      display: block;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 42px;
      background: var(--dark);
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
